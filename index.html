<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
  <link rel="icon" type="image/svg+xml" href="assets/logo.svg">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/tsparticles-confetti@2.12.0/tsparticles.confetti.bundle.min.js"></script>
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>

  <div class="world-bg"></div>
  <div id="particles-bg"></div>

  <!-- ═══ SCENE 1: INTRO ═══ -->
  <div id="scene-intro" class="scene active">
    <div class="parchment animate__animated animate__fadeIn">
      <p class="eyebrow" id="intro-eyebrow"></p>
      <h1 id="intro-title"></h1>
      <p class="tagline" id="intro-tagline"></p>
      <div class="ornate-line"><span>✦</span></div>
      <p class="intro-verse verse" id="intro-verse"></p>
    </div>
    <button class="btn animate__animated animate__fadeInUp animate__delay-1s"
            id="intro-start-btn" onclick="showScene(2)"></button>
  </div>

  <!-- ═══ SCENE 2: CHEST + COMBO LOCK ═══ -->
  <div id="scene-chest" class="scene">

    <div class="chest-visual">
      <div class="chest-lid"></div>
      <div class="chest-lock">
        <div class="chest-lock-shackle"></div>
        <div class="chest-lock-body"></div>
      </div>
      <div class="chest-box">
        <div class="chest-corner tl"></div>
        <div class="chest-corner tr"></div>
        <div class="chest-corner bl"></div>
        <div class="chest-corner br"></div>
      </div>
      <div class="chest-glow"></div>
    </div>

    <div class="parchment">
      <h2 id="chest-title"></h2>
      <p class="hint verse" id="chest-hint"></p>

      <!-- Combo Lock — filled by JS -->
      <div class="combo-lock-wrap">
        <div class="combo-lock" id="combo-lock"></div>
      </div>

      <p class="error-msg" id="error-msg">&nbsp;</p>

      <button class="btn" id="chest-open-btn" onclick="checkCode()"></button>
    </div>
  </div>

  <!-- ═══ SCENE 3: OPENING ═══ -->
  <div id="scene-opening" class="scene">
    <div class="chest-open-visual">
      <div class="chest-rays">
        <div class="ray" style="transform:rotate(-55deg);left:38%"></div>
        <div class="ray" style="transform:rotate(-35deg);left:43%"></div>
        <div class="ray" style="transform:rotate(-15deg);left:48%"></div>
        <div class="ray" style="transform:rotate(5deg); left:52%"></div>
        <div class="ray" style="transform:rotate(25deg);left:57%"></div>
        <div class="ray" style="transform:rotate(45deg);left:62%"></div>
        <div class="ray" style="transform:rotate(65deg);left:67%"></div>
      </div>
      <div class="chest-inner-glow"></div>
      <div class="chest-lid"></div>
      <div class="chest-box">
        <div class="chest-corner tl"></div>
        <div class="chest-corner tr"></div>
        <div class="chest-corner bl"></div>
        <div class="chest-corner br"></div>
      </div>
    </div>
    <h2 class="verse" id="opening-verse"></h2>
  </div>

  <!-- ═══ SCENE 4: REWARD ═══ -->
  <div id="scene-reward" class="scene">
    <div class="parchment">
      <h2 id="reward-title"></h2>
      <div class="ornate-line"><span>✦</span></div>
      <p class="congrats-text verse" id="reward-text"></p>
    </div>
    <div class="cards-container" id="cards-container"></div>
    <button class="btn" id="reward-next-btn" onclick="showScrollScene()"></button>
  </div>

  <!-- chest video — ornate framed overlay -->
  <div id="video-overlay">
    <div id="video-frame">
      <span class="vf-corner vf-tl">✦</span>
      <span class="vf-corner vf-tr">✦</span>
      <video id="chest-video" muted playsinline preload="auto">
        <source src="assets/Анимация_открытия_сундука.mp4" type="video/mp4">
      </video>
      <span class="vf-corner vf-bl">✦</span>
      <span class="vf-corner vf-br">✦</span>
    </div>
  </div>

  <!-- scroll text scene -->
  <div id="scene-scroll" class="scene">
    <div class="scroll-outer">
      <div class="scroll-rod scroll-rod-top"></div>
      <div class="scroll-body-wrap">
        <div class="scroll-content-wrapper" id="scroll-wrapper">
          <div class="scroll-text" id="scroll-body-text">
            <span class="scroll-text-title"></span>
            <span class="scroll-text-body"></span>
          </div>
        </div>
        <div class="scroll-fade-bottom"></div>
        <div class="scroll-hint" id="scroll-hint">
          <span class="scroll-hint-icon" id="scroll-hint-text"></span>
        </div>
      </div>
      <div class="scroll-rod scroll-rod-bottom"></div>
    </div>
  </div>

  <script src="js/content.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
