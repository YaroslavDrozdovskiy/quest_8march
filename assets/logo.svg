<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#2a1200"/>
      <stop offset="100%" stop-color="#0a0500"/>
    </radialGradient>
    <linearGradient id="petalMain" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%"   stop-color="#f5d76e"/>
      <stop offset="45%"  stop-color="#d4a017"/>
      <stop offset="100%" stop-color="#8b6914"/>
    </linearGradient>
    <linearGradient id="petalSide" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#e8c050"/>
      <stop offset="100%" stop-color="#7a5a10"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#b8860b"/>
      <stop offset="100%" stop-color="#5a3e00"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="50" cy="50" r="50" fill="url(#bg)"/>

  <!-- Outer ring -->
  <circle cx="50" cy="50" r="46.5" fill="none" stroke="#d4a017" stroke-width="1.2" opacity="0.45"/>
  <!-- Inner ring -->
  <circle cx="50" cy="50" r="43"   fill="none" stroke="#d4a017" stroke-width="0.5" opacity="0.25"/>

  <!-- Corner ornament dots -->
  <circle cx="50" cy="6"  r="1.4" fill="#d4a017" opacity="0.55"/>
  <circle cx="50" cy="94" r="1.4" fill="#d4a017" opacity="0.55"/>
  <circle cx="6"  cy="50" r="1.4" fill="#d4a017" opacity="0.55"/>
  <circle cx="94" cy="50" r="1.4" fill="#d4a017" opacity="0.55"/>

  <!-- Stem -->
  <path d="M50 76 L50 59" stroke="#c8960e" stroke-width="2.4" stroke-linecap="round"/>

  <!-- Left leaf (curls outward) -->
  <path d="M50 70 C46 66 38 64 33 60 C37 57 45 62 50 67Z"
        fill="url(#leaf)" opacity="0.9"/>
  <!-- Left leaf vein -->
  <path d="M50 69 C45 65 38 62 33 60" stroke="#f5d76e" stroke-width="0.7"
        fill="none" opacity="0.4" stroke-linecap="round"/>

  <!-- Right leaf (curls outward) -->
  <path d="M50 70 C54 66 62 64 67 60 C63 57 55 62 50 67Z"
        fill="url(#leaf)" opacity="0.9"/>
  <!-- Right leaf vein -->
  <path d="M50 69 C55 65 62 62 67 60" stroke="#f5d76e" stroke-width="0.7"
        fill="none" opacity="0.4" stroke-linecap="round"/>

  <!-- Left petal -->
  <path d="M47 58 C43 56 37 51 35 44 C33 37 36 30 40 27
           C40 34 42 42 47 50 Z"
        fill="url(#petalSide)" opacity="0.92"/>

  <!-- Right petal -->
  <path d="M53 58 C57 56 63 51 65 44 C67 37 64 30 60 27
           C60 34 58 42 53 50 Z"
        fill="url(#petalSide)" opacity="0.92"/>

  <!-- Center petal (tallest) -->
  <path d="M50 21 C45 27 42 35 42 44 C42 53 45 58 50 59
           C55 58 58 53 58 44 C58 35 55 27 50 21Z"
        fill="url(#petalMain)" filter="url(#glow)"/>

  <!-- Petal highlight stroke -->
  <path d="M50 21 C45 27 42 35 42 44" stroke="#f5d76e" stroke-width="0.9"
        fill="none" opacity="0.35" stroke-linecap="round"/>

  <!-- Decorative inner dots on center petal -->
  <ellipse cx="50" cy="36" rx="3.5" ry="4.5"
           fill="none" stroke="#f5d76e" stroke-width="0.8" opacity="0.45"/>
  <circle  cx="50" cy="31" r="1.6" fill="#f5d76e" opacity="0.6"/>

  <!-- Stamen dots -->
  <circle cx="45" cy="50" r="1.3" fill="#f5d76e" opacity="0.5"/>
  <circle cx="50" cy="48" r="1.3" fill="#f5d76e" opacity="0.6"/>
  <circle cx="55" cy="50" r="1.3" fill="#f5d76e" opacity="0.5"/>

  <!-- Tiny ornamental swirls at petal tips -->
  <path d="M35 44 C33 41 34 38 36 37" stroke="#f5d76e" stroke-width="0.8"
        fill="none" opacity="0.4" stroke-linecap="round"/>
  <path d="M65 44 C67 41 66 38 64 37" stroke="#f5d76e" stroke-width="0.8"
        fill="none" opacity="0.4" stroke-linecap="round"/>
</svg>
